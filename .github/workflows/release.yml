name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '构建版本号（不含 v 前缀）'
        required: true
        default: '1.9.4'
        type: string

jobs:
  manual-filejump-no-runtime:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      BUILD_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 验证版本号
        shell: pwsh
        run: |
          if ($env:BUILD_VERSION -notmatch '^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid version: $env:BUILD_VERSION"
          }

      - name: Build ShellNavigate native DLLs
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/native/ShellNavigate/build.ps1"
          $d64 = "${{ github.workspace }}/native/ShellNavigate/bin/x64/Release/ClipboardXShellNavigate.dll"
          $d32 = "${{ github.workspace }}/native/ShellNavigate/bin/Win32/Release/ClipboardXShellNavigate32.dll"
          if (-not (Test-Path $d64)) { throw "Missing $d64" }
          if (-not (Test-Path $d32)) { throw "Missing $d32" }

      - name: Publish FileJumpOnly — 不含运行时
        shell: pwsh
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64
          -p:ClipboardXProduct=FileJumpOnly
          -p:SelfContained=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:DebugType=None
          "-p:Version=$env:BUILD_VERSION"
          -o publish/fdd

      - name: 验证目标产物
        shell: pwsh
        run: |
          $exe = 'publish/fdd/ClipboardX-filejump.exe'
          if (-not (Test-Path $exe)) { throw "Missing $exe" }

      # upload-artifact 下载时本身会生成一层 ZIP；直接上传发布目录，避免 ZIP 套 ZIP。
      - name: 上传 FileJumpOnly 无运行时产物
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardX-filejump-${{ inputs.version }}-win-x64-no-runtime
          path: publish/fdd/*
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        flavor: [Full, ClipboardOnly, FileJumpOnly]
        include:
          - flavor: Full
            artifact_prefix: ClipboardX
            exe_name: ClipboardX.exe
          - flavor: ClipboardOnly
            artifact_prefix: ClipboardX-clipboard
            exe_name: ClipboardX-clipboard.exe
          - flavor: FileJumpOnly
            artifact_prefix: ClipboardX-filejump
            exe_name: ClipboardX-filejump.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 编出 ShellNavigate DLL；publish 时 IncludeAllContentForSelfExtract 将其打入单文件 exe，运行时解压到 BaseDirectory
      - name: Build ShellNavigate native DLLs
        if: matrix.flavor != 'ClipboardOnly'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/native/ShellNavigate/build.ps1"
          $d64 = "${{ github.workspace }}/native/ShellNavigate/bin/x64/Release/ClipboardXShellNavigate.dll"
          $d32 = "${{ github.workspace }}/native/ShellNavigate/bin/Win32/Release/ClipboardXShellNavigate32.dll"
          if (-not (Test-Path $d64)) { throw "Missing $d64" }
          if (-not (Test-Path $d32)) { throw "Missing $d32" }

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # 勿对 FDD 使用 EnableCompressionInSingleFile（NETSDK1176：仅独立应用支持捆绑内压缩）。
      - name: Publish — 不含运行时
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64
          -p:ClipboardXProduct=${{ matrix.flavor }}
          -p:SelfContained=false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/fdd

      - name: Publish — 自带运行时（单文件）
        run: >
          dotnet publish ClipboardManager.csproj -c Release -r win-x64
          -p:ClipboardXProduct=${{ matrix.flavor }}
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/sc

      - name: Verify publish output
        shell: pwsh
        run: |
          $exeName = '${{ matrix.exe_name }}'
          foreach ($dir in @('publish/fdd', 'publish/sc')) {
            $exe = Join-Path $dir $exeName
            if (-not (Test-Path $exe)) { throw "Missing $exe" }
          }

      - name: Zip artifacts
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $prefix = '${{ matrix.artifact_prefix }}'
          Compress-Archive -Path 'publish/fdd/*' -DestinationPath "$prefix-$v-win-x64-no-runtime.zip" -Force
          Compress-Archive -Path 'publish/sc/*' -DestinationPath "$prefix-$v-win-x64-self-contained.zip" -Force

      - name: Build Inno Setup 安装包（框架依赖 + 自包含各一）
        if: matrix.flavor == 'Full'
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$v /DPublishDir=..\publish\fdd installer\clipboardx.iss
          $setupFdd = "installer\Output\ClipboardX-$v-setup.exe"
          if (-not (Test-Path $setupFdd)) { throw "Missing $setupFdd" }
          Copy-Item $setupFdd "ClipboardX-$v-setup.exe"
          & $iscc /DAppVersion=$v /DPublishDir=..\publish\sc /DSETUP_SKIP_DOTNET /DSetupOutputSuffix=-setup-self-contained installer\clipboardx.iss
          $setupSc = "installer\Output\ClipboardX-$v-setup-self-contained.exe"
          if (-not (Test-Path $setupSc)) { throw "Missing $setupSc" }
          Copy-Item $setupSc "ClipboardX-$v-setup-self-contained.exe"

      - name: 上传 zip 产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-artifacts
          path: ${{ matrix.artifact_prefix }}-*.zip

      - name: 上传 Inno 安装包（仅完整版）
        if: matrix.flavor == 'Full'
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardX-inno-installer
          path: |
            ClipboardX-*-setup.exe
            ClipboardX-*-setup-self-contained.exe

  create-release:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 组装 Release 正文（CHANGELOG 对应版本 + 发布包说明）
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v v="$VERSION" '
            BEGIN { insection=0 }
            /^## \[/ {
              if ($0 ~ "^## \\[" v "\\]") { insection=1; next }
              if (insection) { exit }
            }
            insection { print }
          ' CHANGELOG.md > changelog_section.md
          if [ ! -s changelog_section.md ]; then
            echo "::error::CHANGELOG.md 中未找到 ## [$VERSION] 章节，请补全后再打 tag"
            exit 1
          fi
          REPO="${{ github.repository }}"
          {
            echo "## 更新内容"
            echo ""
            cat changelog_section.md
            echo ""
            echo "---"
            echo ""
            echo "## 发布包说明"
            echo ""
            echo "| 包名 | 说明 |"
            echo "|------|------|"
            echo "| \`ClipboardX-*\` | 完整版：剪贴板管理 + 文件对话框跳转 |"
            echo "| \`ClipboardX-clipboard-*\` | 仅剪贴板管理（无文件跳转） |"
            echo "| \`ClipboardX-filejump-*\` | 仅文件对话框跳转（无剪贴板历史） |"
            echo "| \`*-no-runtime.zip\` | 需预装 .NET 8 **桌面**运行时（x64） |"
            echo "| \`*-self-contained.zip\` | 自带运行时，解压即用 |"
            echo "| \`*-setup.exe\` | Inno 完整版·框架依赖：体积小；向导可引导安装运行时 |"
            echo "| \`*-setup-self-contained.exe\` | Inno 完整版·自包含：体积较大，无需单独装 .NET |"
            echo ""
            echo "完整版本历史见仓库 [\`CHANGELOG.md\`](https://github.com/${REPO}/blob/master/CHANGELOG.md)。"
          } > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
